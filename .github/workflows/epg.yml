name: Update Alpha EPG

on:
  schedule:
    # Τρέχει κάθε μέρα στις 00:02 ώρα Κύπρου (UTC+3)
    - cron: '2 21 * * *'      # 21:02 UTC = 00:02 Κύπρου (επόμενη μέρα)
  workflow_dispatch:

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run epg.py
        run: python epg.py

      - name: Commit and push epg.xml if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add epg.xml
          
          if ! git diff --staged --quiet; then
            git commit -m "Update Alpha EPG - 2 days"
            git push
          else
            echo "No changes in epg.xml"
          fi
