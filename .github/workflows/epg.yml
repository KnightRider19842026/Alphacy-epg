name: Update Alpha EPG

on:
  schedule:
    - cron: "30 18 * * *"   # 21:30 Κύπρου (UTC+3)
  workflow_dispatch:

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install requests beautifulsoup4

      - name: Run script
        run: python epg.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add epg.xml

          git diff --cached --quiet || git commit -m "Auto EPG update"

          git push
